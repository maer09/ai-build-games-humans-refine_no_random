[preset.0]
name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="build/web/*,.godot/*,.godot-xdg/*,.tmp-godot-data/*,.tmp-godot-config/*,.tmp-godot-cache/*,logs/*,tools/tests/*"
export_path="res://build/web/template-game/index.html"
script_export_mode=1

[preset.0.options]
; When exporting with project-local XDG_DATA_HOME, Godot may not find templates
; installed in the normal user data directory. Set these copied-project values
; to absolute debug/release export template paths before export when needed.
custom_template/debug=""
custom_template/release=""
extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=false
html/custom_html_shell="res://web/custom_shell.html"
html/head_include=""
html/canvas_resize_policy=0
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=0
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
